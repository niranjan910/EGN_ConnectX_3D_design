document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>EGN CONNECT X 2026 — 3D Floor Plan</title>\n<style>\n  html, body { margin: 0; padding: 0; height: 100%; }\n  body { font-family: Helvetica, Arial, sans-serif; color: #2e2a25; background: #f1eee8; }\n  .app { display: flex; flex-direction: column; height: 100vh; }\n  header { background: #1d1a17; color: #f5f3ef; padding: 12px 22px 10px; }\n  .hrow { display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; }\n  .brand { display: flex; flex-direction: column; gap: 2px; min-width: 260px; }\n  .wordmark { font-size: 20px; font-weight: 800; letter-spacing: 0.05em; }\n  .wordmark .grad { background: linear-gradient(90deg, #60a5fa, #a78bfa, #f43f5e); -webkit-background-clip: text; background-clip: text; color: transparent; }\n  .wordmark .x { color: #f43f5e; }\n  .wordmark .thin { font-weight: 400; opacity: 0.5; font-size: 15px; }\n  .sub { font-size: 11.5px; opacity: 0.65; }\n  .tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }\n  .search { display: flex; align-items: center; background: #2c2823; border: 1px solid #3d382f; border-radius: 8px; overflow: hidden; }\n  .search input { background: transparent; border: 0; outline: none; color: #f5f3ef; font-size: 13px; padding: 8px 10px; width: 150px; }\n  .search input::placeholder { color: #857d70; }\n  .search button { background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: #fff; border: 0; font-size: 12.5px; font-weight: 700; padding: 8px 14px; cursor: pointer; }\n  .search.err { border-color: #e11d48; animation: shake 0.3s; }\n  @keyframes shake { 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }\n  .btn { background: #2c2823; color: #d8d2c8; border: 1px solid #3d382f; border-radius: 8px; font-size: 12.5px; padding: 8px 12px; cursor: pointer; }\n  .btn:hover { background: #3a352e; color: #fff; }\n  .btn.on { background: #4338ca; border-color: #6366f1; color: #fff; }\n  .zonebar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 9px; font-size: 12px; }\n  .chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; border: 1px solid #3d382f; cursor: pointer; color: #d8d2c8; user-select: none; }\n  .chip .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }\n  .chip:hover { background: #2c2823; }\n  .chip.active { background: #2c2823; border-color: currentColor; color: #fff; }\n  .chip.static { cursor: default; opacity: 0.75; }\n  .chip.static:hover { background: transparent; }\n  .stats { margin-left: auto; font-size: 11.5px; opacity: 0.55; }\n  .stage { flex: 1; min-height: 0; position: relative; }\n  floor-3d { position: absolute; inset: 0; }\n  .hint { position: absolute; left: 16px; bottom: 14px; background: rgba(255,255,255,0.88); backdrop-filter: blur(4px);\n          border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #56504a; pointer-events: none; }\n  .card { position: absolute; right: 16px; bottom: 16px; width: 250px; background: rgba(255,255,255,0.96); backdrop-filter: blur(6px);\n          border-radius: 12px; box-shadow: 0 10px 32px rgba(30,25,18,0.22); padding: 14px 16px; display: none; }\n  .card.show { display: block; }\n  .card .cid { font-size: 21px; font-weight: 800; display: flex; align-items: center; gap: 8px; }\n  .card .cdot { width: 13px; height: 13px; border-radius: 4px; display: inline-block; }\n  .card .czone { font-size: 12.5px; color: #6b645b; margin-top: 3px; }\n  .card .crow { display: flex; justify-content: space-between; font-size: 12.5px; margin-top: 8px; border-top: 1px solid #eee9e0; padding-top: 8px; }\n  .card .crow b { font-size: 13px; }\n  .card .close { position: absolute; top: 8px; right: 10px; border: 0; background: transparent; font-size: 16px; color: #a09a8e; cursor: pointer; }\n</style>\n<script src=\"4f5a6f4e-abe1-447a-9b60-4bd57be078c9\"><\/script>\n<script src=\"0c296ce5-70da-4f17-928f-8842766540b2\"><\/script>\n</head>\n<body>\n<div class=\"app\">\n  <header>\n    <div class=\"hrow\">\n      <div class=\"brand\">\n        <div class=\"wordmark\">EGN <span class=\"grad\">CONNECT</span><span class=\"x\">X</span> <span class=\"thin\">· 3D Floor Plan</span></div>\n        <div class=\"sub\">Bombay Convention &amp; Exhibition Centre (BEC, NESCO), Mumbai · November 03–04, 2026</div>\n      </div>\n      <div class=\"tools\">\n        <div class=\"search\" id=\"searchBox\">\n          <input id=\"searchInput\" placeholder=\"Find booth… e.g. B42\" spellcheck=\"false\">\n          <button id=\"searchBtn\">Find</button>\n        </div>\n        <button class=\"btn\" id=\"btn3d\">3D View</button>\n        <button class=\"btn\" id=\"btnTop\">Top View</button>\n        <button class=\"btn\" id=\"btnRotate\">⟳ Rotate</button>\n        <button class=\"btn on\" id=\"btnLabels\">Labels</button>\n        <button class=\"btn on\" id=\"btnPeople\">People</button>\n        <button class=\"btn on\" id=\"btnStructure\">Roof</button>\n        <button class=\"btn\" id=\"btnReset\">Reset</button>\n      </div>\n    </div>\n    <div class=\"zonebar\" id=\"zonebar\">\n      <span class=\"chip\" data-zone=\"A\"><span class=\"dot\" style=\"background:#d9862c\"></span>A · Premium</span>\n      <span class=\"chip\" data-zone=\"B\"><span class=\"dot\" style=\"background:#3e7bc4\"></span>B · Standard</span>\n      <span class=\"chip\" data-zone=\"C\"><span class=\"dot\" style=\"background:#3f9b6e\"></span>C · Clusters</span>\n      <span class=\"chip\" data-zone=\"D\"><span class=\"dot\" style=\"background:#8b6bc7\"></span>D · Mid-sized</span>\n      <span class=\"chip\" data-zone=\"E\"><span class=\"dot\" style=\"background:#c75b72\"></span>E · Sponsor</span>\n      <span class=\"chip\" data-zone=\"M\"><span class=\"dot\" style=\"background:#3aa6a6\"></span>M · Meeting</span>\n      <span class=\"chip static\"><span class=\"dot\" style=\"background:#5b6b7e\"></span>Conference Halls</span>\n      <span class=\"chip static\"><span class=\"dot\" style=\"background:#8a6d4f\"></span>Coffee Lounge</span>\n      <span class=\"chip static\"><span class=\"dot\" style=\"background:#e11d2f\"></span>Registration &amp; Services</span>\n      <span class=\"stats\">264 booths · 4 halls · 2 gates · 4 service desks</span>\n    </div>\n  </header>\n  <div class=\"stage\">\n    <floor-3d id=\"floor\" booth-height=\"3\" show-labels=\"true\" auto-rotate=\"false\"></floor-3d>\n    <div class=\"hint\">Drag to orbit · Scroll to zoom · Right-drag to pan · Click a booth for details · Double-click to reset</div>\n    <div class=\"card\" id=\"card\">\n      <button class=\"close\" id=\"cardClose\">✕</button>\n      <div class=\"cid\"><span class=\"cdot\" id=\"cardDot\"></span><span id=\"cardId\"></span></div>\n      <div class=\"czone\" id=\"cardZone\"></div>\n      <div class=\"crow\" id=\"cardRow1\"><span>Area</span><b id=\"cardSqm\"></b></div>\n      <div class=\"crow\" id=\"cardRow2\"><span>Footprint</span><b id=\"cardDims\"></b></div>\n    </div>\n  </div>\n</div>\n<script>\n(function () {\n  var ZONE_COLORS = { A: '#d9862c', B: '#3e7bc4', C: '#3f9b6e', D: '#8b6bc7', E: '#c75b72', M: '#3aa6a6', HALL: '#5b6b7e', LOUNGE: '#8a6d4f' };\n  var ZONE_NAMES = { A: 'Zone A · Premium Exhibitors', B: 'Zone B · Standard Booths', C: 'Zone C · Exhibition Clusters', D: 'Zone D · Mid-sized Blocks', E: 'Zone E · Sponsor & Feature', M: 'Meeting Zone' };\n\n  customElements.whenDefined('floor-3d').then(function () {\n    var floor = document.getElementById('floor');\n    var card = document.getElementById('card');\n    var searchBox = document.getElementById('searchBox');\n    var searchInput = document.getElementById('searchInput');\n    var activeZone = null;\n\n    function showCard(u) {\n      if (!u) { card.classList.remove('show'); return; }\n      document.getElementById('cardDot').style.background = ZONE_COLORS[u.zone] || '#999';\n      document.getElementById('cardId').textContent = u.sqm ? 'Booth ' + u.id : u.id;\n      var r1 = document.getElementById('cardRow1'), r2 = document.getElementById('cardRow2');\n      if (u.zone === 'HALL') {\n        document.getElementById('cardZone').textContent = u.sub;\n        r1.style.display = 'none'; r2.style.display = 'none';\n      } else if (u.zone === 'LOUNGE') {\n        document.getElementById('cardZone').textContent = 'Networking & refreshments';\n        r1.style.display = 'none'; r2.style.display = 'none';\n      } else {\n        document.getElementById('cardZone').textContent = ZONE_NAMES[u.zone] || u.zone;\n        r1.style.display = ''; r2.style.display = '';\n        document.getElementById('cardSqm').textContent = u.sqm + ' SQM';\n        document.getElementById('cardDims').textContent = u.w + ' m × ' + u.d + ' m';\n      }\n      card.classList.add('show');\n    }\n\n    floor.addEventListener('booth-select', function (e) { showCard(e.detail); });\n    document.getElementById('cardClose').addEventListener('click', function () { floor.clearSelection(); });\n    window.addEventListener('keydown', function (e) { if (e.key === 'Escape') floor.clearSelection(); });\n\n    function doSearch() {\n      var q = searchInput.value.trim();\n      if (!q) return;\n      searchBox.classList.remove('err');\n      if (!floor.focusBooth(q)) {\n        searchBox.classList.add('err');\n        setTimeout(function () { searchBox.classList.remove('err'); }, 900);\n      }\n    }\n    document.getElementById('searchBtn').addEventListener('click', doSearch);\n    searchInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch(); });\n\n    document.getElementById('btn3d').addEventListener('click', function () { floor.setView('3d'); });\n    document.getElementById('btnTop').addEventListener('click', function () { floor.setView('top'); });\n    document.getElementById('btnReset').addEventListener('click', function () {\n      floor.resetView();\n      searchInput.value = '';\n      setChips(null);\n    });\n\n    function bindToggle(id, attr, initial) {\n      var btn = document.getElementById(id);\n      var on = initial;\n      btn.addEventListener('click', function () {\n        on = !on;\n        btn.classList.toggle('on', on);\n        floor.setAttribute(attr, on ? 'true' : 'false');\n      });\n    }\n    bindToggle('btnRotate', 'auto-rotate', false);\n    bindToggle('btnLabels', 'show-labels', true);\n    bindToggle('btnPeople', 'show-people', true);\n    bindToggle('btnStructure', 'show-structure', true);\n\n    var chips = Array.prototype.slice.call(document.querySelectorAll('.chip[data-zone]'));\n    function setChips(zone) {\n      activeZone = zone;\n      chips.forEach(function (c) { c.classList.toggle('active', c.dataset.zone === zone); });\n      floor.setZoneFilter(zone);\n    }\n    chips.forEach(function (c) {\n      c.addEventListener('click', function () {\n        setChips(activeZone === c.dataset.zone ? null : c.dataset.zone);\n      });\n    });\n  });\n})();\n<\/script>\n</body></html>\n"</script>
